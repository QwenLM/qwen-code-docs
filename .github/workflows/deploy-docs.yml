name: Build and Deploy Qwen Code Docs Website

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          run_install: false

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: ./website

      - name: Build website
        run: npm run build
        working-directory: ./website
        env:
          # Full multi-locale docs set is memory-heavy to statically export.
          # Node 22 (above) is far more memory-efficient than the previous
          # Node 18 (local full build peaks ~5.8GB); 12GB heap on the 16GB
          # runner leaves comfortable headroom for future growth.
          NODE_OPTIONS: --max-old-space-size=12288

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/out
